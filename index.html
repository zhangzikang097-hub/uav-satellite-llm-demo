<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航拍图在卫星街区图中的位置定位</title>
    <link rel="stylesheet" href="./static/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>航拍图在卫星街区图中的位置定位</h1>
    </header>

    <main class="page">
      <section class="workspace">
        <section class="connector-panel" aria-label="模型 API 接入">
          <div class="connector-copy">
            <h2>模型 API 接入</h2>
            <div class="api-form">
              <label>
                接口地址
                <input id="apiBaseUrl" type="url" value="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" autocomplete="off" />
              </label>
              <label>
                API Key
                <input id="apiKey" type="password" placeholder="sk-... / dashscope-..." autocomplete="off" />
              </label>
              <label>
                Model
                <input id="apiModel" type="text" value="qwen3.7-plus" placeholder="qwen3.7-plus" autocomplete="off" />
              </label>
            </div>
          </div>
        </section>

        <div class="upload-grid">
          <article class="upload-panel">
            <div class="panel-head">
              <h2>航拍局部图</h2>
              <button type="button" class="secondary small" data-replace="uavInput">替换</button>
            </div>
            <label class="drop-zone" id="uavDrop" for="uavInput">
              <input id="uavInput" type="file" accept="image/png,image/jpeg" />
              <img id="uavPreview" alt="航拍局部图预览" hidden />
            </label>
          </article>

          <article class="upload-panel">
            <div class="panel-head">
              <h2>卫星街区大图</h2>
              <button type="button" class="secondary small" data-replace="satInput">替换</button>
            </div>
            <label class="drop-zone" id="satDrop" for="satInput">
              <input id="satInput" type="file" accept="image/png,image/jpeg" />
              <img id="satPreview" alt="卫星街区大图预览" hidden />
            </label>
          </article>
        </div>

        <div class="actions">
          <button id="sampleBtn" type="button" class="secondary">加载示例</button>
          <button id="startBtn" type="button" class="primary" disabled>开始定位</button>
          <button id="testBtn" type="button" class="secondary">测试模型连接</button>
        </div>
        <div id="notice" class="notice" role="status" hidden></div>
      </section>

      <section id="stagePanel" class="stage-panel" hidden>
        <h2>真实处理进度</h2>
        <strong id="stageText">等待任务开始</strong>
        <ol id="progressList" class="progress-list" aria-label="定位任务进度"></ol>
      </section>

      <section id="resultPanel" class="result-panel" hidden>
        <div class="result-head">
          <div>
            <span class="status-badge localized">定位完成</span>
            <h2 id="resultMessage">红框已回写到原始卫星图</h2>
          </div>
        </div>

        <figure class="annotated-figure">
          <img id="annotatedImage" alt="带红框定位结果的卫星大图" />
        </figure>

        <section class="reason-panel">
          <h3>匹配依据</h3>
          <div id="reasonText" class="reason-text">暂无</div>
        </section>
      </section>
    </main>

    <script src="./static/js/app.js"></script>
  </body>
</html>
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航拍图在卫星街区图中的位置定位</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f7f9fb;
  --surface: #ffffff;
  --ink: #172033;
  --muted: #657184;
  --line: #d8dee8;
  --blue: #2563eb;
  --blue-dark: #1d4ed8;
  --red: #dc2626;
  --gray: #475569;
  --green: #047857;
  --error: #b91c1c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
}

button,
input {
  font: inherit;
}

h1,
h2,
h3 {
  margin: 0;
}

.topbar {
  padding: 26px clamp(18px, 4vw, 48px);
  background: var(--surface);
  border-bottom: 1px solid var(--line);
}

h1 {
  font-size: 28px;
  line-height: 1.25;
  font-weight: 700;
}

.page {
  width: min(1180px, calc(100% - 32px));
  margin: 26px auto 40px;
}

.workspace,
.result-panel,
.stage-panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 22px;
}

.connector-panel {
  margin-bottom: 22px;
  padding: 16px;
  border: 1px solid #bfdbfe;
  border-radius: 8px;
  background: #f8fbff;
}

.connector-copy {
  display: grid;
  gap: 8px;
}

.connector-copy h2,
.panel-head h2,
.stage-panel h2 {
  font-size: 18px;
}

.api-form {
  display: grid;
  grid-template-columns: minmax(220px, 1.2fr) minmax(180px, 0.9fr) minmax(150px, 0.7fr);
  gap: 12px;
  margin-top: 6px;
}

.api-form label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: 14px;
}

.api-form input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px;
  color: var(--ink);
  background: #fff;
}

.api-form input:focus {
  outline: 2px solid #bfdbfe;
  border-color: var(--blue);
}

.upload-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.upload-panel {
  min-width: 0;
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.drop-zone {
  position: relative;
  display: grid;
  place-items: center;
  min-height: 300px;
  border: 1px dashed #9aa8ba;
  border-radius: 8px;
  background: #fbfcfe;
  overflow: hidden;
  cursor: pointer;
}

.drop-zone.dragover {
  border-color: var(--blue);
  background: #eef5ff;
}

.drop-zone input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}

.drop-zone img {
  width: 100%;
  height: 100%;
  max-height: 420px;
  object-fit: contain;
  background: #eef1f5;
}

.actions {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}

button {
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 10px 15px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.primary {
  background: var(--blue);
  color: white;
}

.primary:hover:not(:disabled) {
  background: var(--blue-dark);
}

.secondary {
  background: white;
  border-color: var(--line);
  color: var(--ink);
}

.secondary:hover:not(:disabled) {
  border-color: #9aa8ba;
}

.small {
  min-height: 32px;
  padding: 6px 10px;
  font-size: 13px;
}

.notice {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 6px;
  background: #eef5ff;
  border: 1px solid #bfdbfe;
  color: #1e3a8a;
}

.notice.error {
  background: #fef2f2;
  border-color: #fecaca;
  color: var(--error);
}

.stage-panel,
.result-panel {
  margin-top: 18px;
}

.stage-panel {
  display: grid;
  gap: 6px;
}

.stage-panel strong {
  font-size: 18px;
}

.progress-list {
  display: grid;
  gap: 8px;
  margin: 8px 0 0;
  padding-left: 0;
  list-style: none;
}

.progress-list li {
  display: grid;
  grid-template-columns: 64px minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  color: var(--muted);
  line-height: 1.55;
}

.progress-stage {
  display: inline-flex;
  justify-content: center;
  min-width: 54px;
  border: 1px solid #c7d2fe;
  border-radius: 999px;
  padding: 2px 8px;
  color: #1d4ed8;
  background: #eff6ff;
  font-size: 12px;
  font-weight: 700;
}

.result-head {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  align-items: start;
}

.status-badge {
  display: inline-flex;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 700;
  color: white;
  background: var(--gray);
}

.status-badge.localized {
  background: var(--red);
}

#resultMessage {
  margin-top: 10px;
  font-size: 20px;
}

.annotated-figure {
  margin: 20px 0 0;
  min-width: 0;
}

.annotated-figure img {
  width: 100%;
  max-height: 720px;
  object-fit: contain;
  background: #eef1f5;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.reason-panel {
  margin-top: 20px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}

.reason-panel h3 {
  font-size: 16px;
  margin-bottom: 8px;
}

.reason-text {
  color: var(--muted);
  line-height: 1.7;
}

[hidden] {
  display: none !important;
}

@media (max-width: 860px) {
  .result-head {
    flex-direction: column;
  }

  .upload-grid,
  .api-form {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: 24px;
  }
}

    </style>
  </head>

const settings = {
  tileSize: 768,
  strideRatio: 0.75,
  maxLevels: 1,
  minRegionSize: 320,
  contextRatio: 0.25,
  maxTilesPerLevel: 16,
  llmMaxImageSide: 768,
  jpegQuality: 0.6
};

const defaultEndpoint = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";

const $ = (id) => document.getElementById(id);

function isFilePage() {
  return window.location.protocol === "file:";
}

function requireHttpPage() {
  if (!isFilePage()) return true;
  setNotice("请通过 http://127.0.0.1:8080 或 GitHub Pages 打开本页面，直接 file:// 打开会导致浏览器拦截示例加载和模型请求。", true);
  return false;
}

function getApiConfig() {
  return {
    baseUrl: $("apiBaseUrl").value.trim() || defaultEndpoint,
    apiKey: $("apiKey").value.trim(),
    model: $("apiModel").value.trim()
  };
}

function apiReady() {
  const api = getApiConfig();
  return Boolean(api.baseUrl && api.apiKey && api.model);
}

function setNotice(message, isError = false) {
  const notice = $("notice");
  notice.textContent = message;
  notice.classList.toggle("error", isError);
  notice.hidden = !message;
}

function updateStartButton() {
  $("startBtn").disabled = !(apiReady() && state.uavImage && state.satImage);
}

function stageLabel(stage) {
  const labels = {
    queued: "排队",
    prepare: "读取",
    tiling: "切片",
    overview: "编号图",
    model: "模型",
    selection: "选择",
    refine: "细分",
    annotate: "绘制",
    done: "完成",
    error: "失败"
  };
  return labels[stage] || "进度";
}

function pushProgress(stage, message) {
  state.progress.push({ stage, message });
  const panel = $("stagePanel");
  const text = $("stageText");
  const list = $("progressList");
  panel.hidden = false;
  text.textContent = message;
  list.replaceChildren();
  state.progress.forEach((event) => {
    const item = document.createElement("li");
    const label = document.createElement("span");
    const content = document.createElement("span");
    label.className = "progress-stage";
    label.textContent = stageLabel(event.stage);
    content.textContent = event.message;
    item.append(label, content);
    list.appendChild(item);
  });
}

function resetProgress() {
  state.progress = [];
  $("stagePanel").hidden = true;
  $("progressList").replaceChildren();
}

function imageFromFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const image = new Image();
    image.onload = () => {
      URL.revokeObjectURL(url);
      resolve(image);
    };
    image.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("图片读取失败。"));
    };
    image.src = url;
  });
}

async function setPreview(kind, file) {
  const image = await imageFromFile(file);
  const preview = kind === "uav" ? $("uavPreview") : $("satPreview");
  const drop = kind === "uav" ? $("uavDrop") : $("satDrop");
  preview.src = URL.createObjectURL(file);
  preview.hidden = false;
  drop.classList.add("has-image");
  if (kind === "uav") {
    state.uavFile = file;
    state.uavImage = image;
  } else {
    state.satFile = file;
    state.satImage = image;
  }
  updateStartButton();
}

async function acceptFile(kind, file) {
  if (!file) return;
  if (!["image/jpeg", "image/jpg", "image/png"].includes(file.type)) {
    setNotice("仅支持 JPG、JPEG 或 PNG 图片。", true);
    return;
  }
  setNotice("");
  await setPreview(kind, file);
}

function setupUpload(kind, inputId, dropId) {
  const input = $(inputId);
  const drop = $(dropId);
  input.addEventListener("change", () => acceptFile(kind, input.files[0]));
  drop.addEventListener("dragover", (event) => {
    event.preventDefault();
    drop.classList.add("dragover");
  });
  drop.addEventListener("dragleave", () => drop.classList.remove("dragover"));
  drop.addEventListener("drop", (event) => {
    event.preventDefault();
    drop.classList.remove("dragover");
    acceptFile(kind, event.dataTransfer.files[0]);
  });
}

async function fileFromUrl(url, filename) {
  const response = await fetch(url, { cache: "no-store" });
  if (!response.ok) throw new Error("示例图片加载失败。");
  const blob = await response.blob();
  return new File([blob], filename, { type: blob.type || "image/jpeg" });
}

async function loadSampleCase() {
  if (!requireHttpPage()) return;
  $("sampleBtn").disabled = true;
  setNotice("");
  try {
    const [uavFile, satFile] = await Promise.all([
      fileFromUrl(sampleCase.uav, "case_01_drone_query.jpg"),
      fileFromUrl(sampleCase.satellite, "case_01_satellite_street_area.jpg")
    ]);
    await Promise.all([setPreview("uav", uavFile), setPreview("sat", satFile)]);
  } catch (error) {
    setNotice(error.message || "示例图片加载失败。", true);
  } finally {
    $("sampleBtn").disabled = false;
    updateStartButton();
  }
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function slidingSpans(length, tileLength, stride) {
  if (length <= tileLength) return [[0, length]];
  const maxStart = length - tileLength;
  const starts = [];
  for (let start = 0; start <= maxStart; start += stride) starts.push(start);
  if (starts[starts.length - 1] !== maxStart) starts.push(maxStart);
  return starts.map((start) => [start, Math.min(length, start + tileLength)]);
}

function createAdaptiveTiles(image, sourceBox, level) {
  let effectiveTileSize = Math.min(settings.tileSize, Math.max(sourceBox.width, sourceBox.height));
  let xSpans = [];
  let ySpans = [];
  while (true) {
    const tileW = Math.min(effectiveTileSize, sourceBox.width);
    const tileH = Math.min(effectiveTileSize, sourceBox.height);
    const strideX = Math.max(1, Math.round(tileW * settings.strideRatio));
    const strideY = Math.max(1, Math.round(tileH * settings.strideRatio));
    xSpans = slidingSpans(sourceBox.width, tileW, strideX);
    ySpans = slidingSpans(sourceBox.height, tileH, strideY);
    const count = xSpans.length * ySpans.length;
    if (count <= settings.maxTilesPerLevel || effectiveTileSize >= Math.max(sourceBox.width, sourceBox.height)) break;
    effectiveTileSize = Math.min(Math.max(sourceBox.width, sourceBox.height), Math.ceil(effectiveTileSize * 1.25));
  }

  const tiles = [];
  ySpans.forEach(([relY0, relY1]) => {
    xSpans.forEach(([relX0, relX1]) => {
      tiles.push({
        id: tiles.length + 1,
        level,
        bbox: {
          x0: sourceBox.x0 + relX0,
          y0: sourceBox.y0 + relY0,
          x1: sourceBox.x0 + relX1,
          y1: sourceBox.y0 + relY1,
          width: relX1 - relX0,
          height: relY1 - relY0
        }
      });
    });
  });
  return tiles;
}

function drawImageToCanvas(image, maxSide = null) {
  const scale = maxSide ? Math.min(maxSide / Math.max(image.naturalWidth, image.naturalHeight), 1) : 1;
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
  canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
  const ctx = canvas.getContext("2d");
  ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
  return canvas;
}

function canvasToJpegDataUrl(canvas, maxSide = settings.llmMaxImageSide) {
  let output = canvas;
  if (Math.max(canvas.width, canvas.height) > maxSide) {
    const scale = maxSide / Math.max(canvas.width, canvas.height);
    output = document.createElement("canvas");
    output.width = Math.max(1, Math.round(canvas.width * scale));
    output.height = Math.max(1, Math.round(canvas.height * scale));
    output.getContext("2d").drawImage(canvas, 0, 0, output.width, output.height);
  }
  return output.toDataURL("image/jpeg", settings.jpegQuality);
}

function imageToJpegDataUrl(image, maxSide = settings.llmMaxImageSide) {
  return canvasToJpegDataUrl(drawImageToCanvas(image, maxSide), maxSide);
}

function makeNumberedOverview(image, tiles, viewBox) {
  const scale = Math.min(settings.llmMaxImageSide / Math.max(viewBox.width, viewBox.height), 1);
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(viewBox.width * scale));
  canvas.height = Math.max(1, Math.round(viewBox.height * scale));
  const ctx = canvas.getContext("2d");
  ctx.drawImage(image, viewBox.x0, viewBox.y0, viewBox.width, viewBox.height, 0, 0, canvas.width, canvas.height);
  const scaleX = canvas.width / viewBox.width;
  const scaleY = canvas.height / viewBox.height;
  ctx.lineWidth = Math.max(2, Math.round(Math.max(canvas.width, canvas.height) / 420));
  ctx.font = "bold 18px Arial";
  ctx.textBaseline = "top";
  tiles.forEach((tile) => {
    const x0 = Math.round((tile.bbox.x0 - viewBox.x0) * scaleX);
    const y0 = Math.round((tile.bbox.y0 - viewBox.y0) * scaleY);
    const x1 = Math.round((tile.bbox.x1 - viewBox.x0) * scaleX);
    const y1 = Math.round((tile.bbox.y1 - viewBox.y0) * scaleY);
    const label = String(tile.id);
    const labelW = 22 + ctx.measureText(label).width;
    ctx.strokeStyle = "#dc2626";
    ctx.fillStyle = "#dc2626";
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
    ctx.fillRect(x0, y0, labelW, 26);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(label, x0 + 7, y0 + 5);
  });
  return canvas;
}

function expandBBox(bbox, image, ratio) {
  const padX = Math.round((bbox.x1 - bbox.x0) * ratio);
  const padY = Math.round((bbox.y1 - bbox.y0) * ratio);
  const x0 = clamp(bbox.x0 - padX, 0, image.naturalWidth);
  const y0 = clamp(bbox.y0 - padY, 0, image.naturalHeight);
  const x1 = clamp(bbox.x1 + padX, 0, image.naturalWidth);
  const y1 = clamp(bbox.y1 + padY, 0, image.naturalHeight);
  return { x0, y0, x1, y1, width: x1 - x0, height: y1 - y0 };
}

function shouldStop(tile, level) {
  return level >= settings.maxLevels || Math.max(tile.bbox.width, tile.bbox.height) <= settings.minRegionSize;
}

function buildPrompt(tileCount, level) {
  return `你正在做航拍局部图在卫星街区大图中的位置定位。

前提：航拍图对应的地面区域默认包含在用户上传的卫星大图中。你会看到一张带红色编号候选框的卫星总览图，请选择最可能包含该航拍场景的编号。

请仅依据图中可见的稳定空间关系：道路走向、建筑轮廓、屋顶形态、建筑间距、绿地、水体、停车区、围墙、广场等。

不要使用城市名称、GPS、地图常识、文字标签、界面元素或任何不可见信息。不要输出像素坐标。

当前是第 ${level} 级候选选择，候选编号为 1 到 ${tileCount}。只能选择这些编号中的一个。

仅输出严格 JSON，不要 Markdown，不要解释 JSON 外的内容：
{
  "selected_tile_id": 1,
  "confidence": 0.0,
  "reason": "简短说明道路、建筑、绿地或屋顶等匹配依据"
}`;
}

function chatCompletionsUrl(baseUrl) {
  const trimmed = baseUrl.replace(/\/+$/, "");
  if (trimmed.endsWith("/chat/completions")) return trimmed;
  return `${trimmed}/chat/completions`;
}

function readableModelError(error) {
  if (error instanceof TypeError) {
    if (isFilePage()) {
      return "请求被浏览器拦截：请通过 http://127.0.0.1:8080 或 GitHub Pages 打开，不要直接 file:// 打开。";
    }
    return "请求没有成功发出，常见原因是接口地址不正确、网络不可达，或模型服务未允许浏览器跨域请求。";
  }
  const message = String(error?.message || "");
  if (message.includes("401") || message.includes("403")) return "模型鉴权失败，请检查 API Key 和账号权限。";
  if (message.includes("404")) return "接口地址或模型 ID 不正确，请确认地址是 /compatible-mode/v1/chat/completions，模型名有访问权限。";
  if (message.includes("429")) return "模型接口限流或配额不足，请稍后重试。";
  return message || "模型调用失败。";
}

async function callVisionModel(prompt, imageUrls, api) {
  let response;
  try {
    response = await fetch(chatCompletionsUrl(api.baseUrl), {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${api.apiKey}`
      },
      body: JSON.stringify({
        model: api.model,
        messages: [
          {
            role: "user",
            content: [
              { type: "text", text: prompt },
              ...imageUrls.map((url) => ({ type: "image_url", image_url: { url } }))
            ]
          }
        ],
        temperature: 0,
        max_tokens: 300
      })
    });
  } catch (error) {
    throw new Error(readableModelError(error));
  }

  if (!response.ok) {
    const text = await response.text();
    throw new Error(readableModelError(new Error(`模型调用失败：${response.status} ${text.slice(0, 160)}`)));
  }
  const data = await response.json();
  const content = data?.choices?.[0]?.message?.content;
  if (Array.isArray(content)) {
    return content.map((part) => part.text || "").join("
").trim();
  }
  return String(content || "").trim();
}

function extractJson(text) {
  const stripped = text.trim().replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
  const start = stripped.indexOf("{");
  if (start < 0) throw new Error("模型没有返回 JSON。");
  let depth = 0;
  let inString = false;
  let escaped = false;
  for (let index = start; index < stripped.length; index += 1) {
    const char = stripped[index];
    if (inString) {
      if (escaped) escaped = false;
      else if (char === "\") escaped = true;
      else if (char === "\"") inString = false;
      continue;
    }
    if (char === "\"") inString = true;
    else if (char === "{") depth += 1;
    else if (char === "}") {
      depth -= 1;
      if (depth === 0) return JSON.parse(stripped.slice(start, index + 1));
    }
  }
  throw new Error("模型返回的 JSON 不完整。");
}

function validateSelection(payload, tileCount) {
  const tileId = Number(payload.selected_tile_id);
  if (!Number.isInteger(tileId) || tileId < 1 || tileId > tileCount) {
    throw new Error(`模型选择编号不在 1 到 ${tileCount} 范围内。`);
  }
  return {
    selectedTileId: tileId,
    reason: String(payload.reason || "模型未提供理由。").slice(0, 180)
  };
}

function annotateSatellite(image, bbox) {
  const canvas = drawImageToCanvas(image);
  const ctx = canvas.getContext("2d");
  const lineWidth = Math.max(3, Math.round(Math.min(canvas.width, canvas.height) / 160));
  ctx.strokeStyle = "#dc2626";
  ctx.lineWidth = lineWidth;
  ctx.strokeRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
  ctx.fillStyle = "#dc2626";
  ctx.font = "bold 18px Arial";
  ctx.textBaseline = "top";
  const label = "定位区域";
  const labelW = Math.max(86, ctx.measureText(label).width + 18);
  const labelY = Math.max(0, bbox.y0 - 32);
  ctx.fillRect(bbox.x0, labelY, labelW, 30);
  ctx.fillStyle = "#ffffff";
  ctx.fillText(label, bbox.x0 + 9, labelY + 6);
  return canvas;
}

async function testModel() {
  if (!requireHttpPage()) return;
  if (!apiReady()) {
    setNotice("请填写 Base URL、API Key 和 Model。", true);
    return;
  }
  $("testBtn").disabled = true;
  setNotice("正在测试模型连接。");
  try {
    const canvas = document.createElement("canvas");
    canvas.width = 24;
    canvas.height = 24;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, 24, 24);
    ctx.strokeStyle = "#dc2626";
    ctx.lineWidth = 2;
    ctx.strokeRect(5, 5, 14, 14);
    await callVisionModel("请只返回 TEST_OK。", [canvas.toDataURL("image/jpeg", 0.8)], getApiConfig());
    setNotice("模型连接测试通过。");
  } catch (error) {
    setNotice(readableModelError(error), true);
  } finally {
    $("testBtn").disabled = false;
  }
}

async function runLocalization() {
  if (!requireHttpPage()) return;
  if (!state.uavImage || !state.satImage || !apiReady()) return;
  $("startBtn").disabled = true;
  $("resultPanel").hidden = true;
  setNotice("");
  resetProgress();
  const api = getApiConfig();
  let currentRegion = {
    x0: 0,
    y0: 0,
    x1: state.satImage.naturalWidth,
    y1: state.satImage.naturalHeight,
    width: state.satImage.naturalWidth,
    height: state.satImage.naturalHeight
  };
  let finalTile = null;
  let finalSelection = null;

  try {
    pushProgress("prepare", `已读取上传图片：航拍图 ${state.uavImage.naturalWidth}×${state.uavImage.naturalHeight}，卫星图 ${state.satImage.naturalWidth}×${state.satImage.naturalHeight}。`);
    const uavDataUrl = imageToJpegDataUrl(state.uavImage);
    for (let level = 1; level <= settings.maxLevels; level += 1) {
      pushProgress("tiling", `第 ${level} 级：正在生成候选窗口。`);
      const tiles = createAdaptiveTiles(state.satImage, currentRegion, level);
      if (!tiles.length) throw new Error("未能生成候选切片。");
      pushProgress("overview", `第 ${level} 级：已生成 ${tiles.length} 个动态候选块，并绘制带编号的卫星总览图。`);
      const overview = makeNumberedOverview(state.satImage, tiles, currentRegion);

      let selection;
      if (tiles.length === 1) {
        selection = { selectedTileId: 1, reason: "当前候选区域已退化为单一窗口。" };
        pushProgress("selection", `第 ${level} 级：只有 1 个候选块，直接进入最终框计算。`);
      } else {
        pushProgress("model", `第 ${level} 级：正在调用视觉模型，从 ${tiles.length} 个编号候选中选择最可能区域。`);
        const text = await callVisionModel(buildPrompt(tiles.length, level), [uavDataUrl, canvasToJpegDataUrl(overview)], api);
        selection = validateSelection(extractJson(text), tiles.length);
        pushProgress("selection", `第 ${level} 级：模型选择 ${selection.selectedTileId} 号候选。依据：${selection.reason}`);
      }

      const selectedTile = tiles[selection.selectedTileId - 1];
      finalTile = selectedTile;
      finalSelection = selection;

      if (shouldStop(selectedTile, level)) {
        pushProgress("refine", `第 ${level} 级：候选区域已满足停止条件，准备绘制红框。`);
        break;
      }
      currentRegion = expandBBox(selectedTile.bbox, state.satImage, settings.contextRatio);
      pushProgress("refine", `第 ${level} 级：已按选中候选块外扩上下文，进入下一轮细分。`);
    }

    if (!finalTile || !finalSelection) throw new Error("定位流程没有产生最终候选框。");
    pushProgress("annotate", "正在使用浏览器端坐标换算结果，在原始卫星图上绘制最终红框。");
    const annotated = annotateSatellite(state.satImage, finalTile.bbox);
    $("annotatedImage").src = annotated.toDataURL("image/png");
    $("resultMessage").textContent = "定位完成";
    $("reasonText").textContent = finalSelection.reason;
    $("resultPanel").hidden = false;
    pushProgress("done", "定位完成：红框已回写到原始卫星图，页面可查看匹配依据。");
  } catch (error) {
    const message = readableModelError(error);
    pushProgress("error", message);
    setNotice(message, true);
  } finally {
    updateStartButton();
  }
}

document.addEventListener("DOMContentLoaded", () => {
  setupUpload("uav", "uavInput", "uavDrop");
  setupUpload("sat", "satInput", "satDrop");
  document.querySelectorAll("[data-replace]").forEach((button) => {
    button.addEventListener("click", () => $(button.dataset.replace).click());
  });
  $("sampleBtn").addEventListener("click", loadSampleCase);
  $("testBtn").addEventListener("click", testModel);
  $("startBtn").addEventListener("click", runLocalization);
  ["apiBaseUrl", "apiKey", "apiModel"].forEach((id) => {
    $(id).addEventListener("input", () => {
      setNotice("");
      updateStartButton();
    });
  });
  if (isFilePage()) {
    setNotice("请通过 http://127.0.0.1:8080 或 GitHub Pages 打开本页面，直接 file:// 打开会导致浏览器拦截示例加载和模型请求。", true);
  }
  updateStartButton();
});
